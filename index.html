<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>你的專業愈強，愈容易被低估</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --berry:#6D2E46;--berry-l:#A26769;--berry-ll:#EDD9E0;--berry-d:#4A1B2F;
  --dark:#1E1228;--dark2:#2D1B3D;--dark3:#3D2650;
  --cream:#F5EFE6;--offwhite:#FAF7F3;--warm:#E8DDD0;
  --muted:#8C7A85;--border:#D9CCCC;--text:#2D1B3D;
  --gold:#C9A96E;
}
html,body{width:100%;height:100%;overflow:hidden;background:#111;font-family:'DM Sans',sans-serif}
#deck{width:100%;height:100%;display:flex;align-items:center;justify-content:center}
.slide{
  position:absolute;width:min(100vw,177.78vh);height:min(56.25vw,100vh);
  display:none;flex-direction:column;overflow:hidden;
}
.slide.active{display:flex}
.slide.enter{animation:slideIn .45s cubic-bezier(.22,1,.36,1) both}
.slide.exit{animation:slideOut .35s cubic-bezier(.55,0,1,.45) both}
@keyframes slideIn{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:none}}
@keyframes slideOut{from{opacity:1;transform:none}to{opacity:0;transform:translateY(-14px)}}

/* ── TYPOGRAPHY SCALES (based on slide height = h) ── */
.t-hero{font-family:'Cormorant Garamond',serif;font-size:clamp(32px,6.5vh,72px);font-weight:500;line-height:1.15;letter-spacing:-.01em}
.t-hero-sm{font-family:'Cormorant Garamond',serif;font-size:clamp(24px,4.8vh,54px);font-weight:500;line-height:1.2}
.t-title{font-family:'Cormorant Garamond',serif;font-size:clamp(20px,3.8vh,42px);font-weight:500;line-height:1.25}
.t-subtitle{font-size:clamp(12px,1.9vh,21px);font-weight:300;line-height:1.55}
.t-body{font-size:clamp(11px,1.7vh,19px);font-weight:400;line-height:1.65}
.t-small{font-size:clamp(9px,1.4vh,15px);font-weight:400;line-height:1.5}
.t-label{font-size:clamp(8px,1.15vh,13px);font-weight:500;letter-spacing:.08em;text-transform:uppercase}
.t-quote{font-family:'Cormorant Garamond',serif;font-size:clamp(18px,3.2vh,36px);font-weight:400;font-style:italic;line-height:1.45}

/* ── BACKGROUNDS ── */
.bg-dark{background:var(--dark2)}
.bg-dark2{background:var(--dark)}
.bg-cream{background:var(--offwhite)}
.bg-warm{background:var(--cream)}

/* ── LAYOUT HELPERS ── */
.pad{padding:clamp(20px,4vh,48px) clamp(24px,5vw,72px)}
.pad-top{padding-top:clamp(16px,3vh,36px)}
.col{display:flex;flex-direction:column}
.row{display:flex;flex-direction:row}
.gap-sm{gap:clamp(6px,1vh,12px)}
.gap-md{gap:clamp(10px,1.8vh,20px)}
.gap-lg{gap:clamp(14px,2.5vh,28px)}
.flex1{flex:1}
.center{align-items:center;justify-content:center}
.h-center{justify-content:center}
.v-center{align-items:center}
.text-center{text-align:center}

/* ── ACCENT BAR ── */
.left-bar::before{content:'';position:absolute;left:0;top:0;width:clamp(4px,.6vw,8px);height:100%;background:var(--berry)}
.left-bar{position:relative}
.top-bar{position:relative}
.top-bar::before{content:'';position:absolute;top:0;left:0;right:0;height:clamp(3px,.5vh,6px);background:var(--berry)}
.bottom-berry{position:relative}
.bottom-berry::after{content:'';position:absolute;bottom:0;left:0;right:0;height:clamp(28px,4.5vh,52px);background:var(--berry)}
.bottom-berry-text{position:absolute;bottom:0;left:0;right:0;height:clamp(28px,4.5vh,52px);display:flex;align-items:center;justify-content:center;z-index:2}

/* ── CH BAR ── */
.ch-bar{display:flex;align-items:center;gap:clamp(6px,1vw,12px);padding:clamp(8px,1.2vh,14px) clamp(24px,5vw,72px);border-bottom:1px solid rgba(255,255,255,.08)}
.ch-bar-light{border-bottom:1px solid var(--border)}
.ch-dot{width:clamp(3px,.4vw,5px);height:clamp(16px,2.8vh,32px);background:var(--berry);flex-shrink:0;border-radius:2px}

/* ── CARDS ── */
.card{background:#fff;border:1px solid var(--border);border-radius:clamp(6px,.8vw,12px);padding:clamp(12px,2vh,24px) clamp(14px,2.2vw,28px)}
.card-dark{background:var(--dark3);border:1px solid rgba(255,255,255,.1);border-radius:clamp(6px,.8vw,12px);padding:clamp(12px,2vh,24px) clamp(14px,2.2vw,28px)}
.card-berry{background:var(--berry);border-radius:clamp(6px,.8vw,12px);padding:clamp(12px,2vh,24px) clamp(14px,2.2vw,28px)}
.card-cream{background:var(--cream);border:1px solid var(--border);border-radius:clamp(6px,.8vw,12px);padding:clamp(12px,2vh,24px) clamp(14px,2.2vw,28px)}

/* ── BADGES ── */
.badge{display:inline-block;padding:clamp(2px,.4vh,5px) clamp(8px,1.2vw,14px);border-radius:20px;font-size:clamp(8px,1.1vh,12px);font-weight:500}
.badge-case{background:#EAF3DE;color:#27500A}
.badge-tool{background:#E1F5EE;color:#0F6E56}

/* ── STRIPE ACCENT ── */
.stripe{width:clamp(24px,4vw,48px);height:clamp(2px,.35vh,4px);background:var(--berry);border-radius:2px}
.stripe-gold{width:clamp(24px,4vw,48px);height:clamp(2px,.35vh,4px);background:var(--gold);border-radius:2px}

/* ── DIVIDER ── */
.divider{height:1px;background:var(--border)}
.divider-dark{height:1px;background:rgba(255,255,255,.12)}

/* ── NAV ── */
#nav{position:fixed;bottom:clamp(10px,2vh,22px);left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:clamp(8px,1.5vw,18px);background:rgba(30,18,40,.85);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.12);border-radius:40px;padding:clamp(6px,1vh,10px) clamp(14px,2.5vw,24px);z-index:100}
#nav button{background:none;border:none;color:rgba(255,255,255,.5);cursor:pointer;font-size:clamp(10px,1.5vh,16px);font-family:'DM Sans',sans-serif;padding:clamp(2px,.4vh,4px) clamp(6px,1vw,10px);border-radius:20px;transition:all .2s}
#nav button:hover{color:#fff;background:rgba(255,255,255,.08)}
#pg{color:rgba(255,255,255,.4);font-size:clamp(9px,1.3vh,13px);min-width:clamp(36px,5vw,56px);text-align:center}
#fullbtn{color:rgba(255,255,255,.4);cursor:pointer;font-size:clamp(9px,1.3vh,13px)}

/* ── PROGRESS ── */
#progress{position:fixed;top:0;left:0;height:2px;background:var(--berry);z-index:101;transition:width .3s ease}

/* ── BEFORE/AFTER ── */
.ba-before{background:var(--cream);border:1px solid var(--border);border-radius:clamp(6px,.8vw,12px)}
.ba-after{background:var(--berry);border-radius:clamp(6px,.8vw,12px)}

/* ── COMPARE COL ── */
.cmp-col{flex:1;border-radius:clamp(6px,.8vw,12px);padding:clamp(10px,1.8vh,20px) clamp(12px,2vw,22px)}
.cmp-muted{background:var(--cream);border:1px solid var(--border)}
.cmp-berry{background:var(--berry)}

/* ── PYRAMID ── */
.pyr-row{display:flex;justify-content:center}
.pyr-block{border-radius:clamp(4px,.5vw,8px);display:flex;align-items:center;justify-content:center;padding:clamp(6px,1vh,12px)}

/* ── STEP FLOW ── */
.step-box{flex:1;border-radius:clamp(6px,.8vw,12px);padding:clamp(10px,1.8vh,20px) clamp(10px,1.8vw,20px);position:relative}
.step-num{font-family:'Cormorant Garamond',serif;font-size:clamp(28px,5vh,56px);font-weight:500;opacity:.25;line-height:1}

/* ── QUOTE BREATH ── */
@keyframes breathe{0%,100%{opacity:.85}50%{opacity:1}}
.breathe{animation:breathe 3.5s ease-in-out infinite}

/* ── LIST ITEM ── */
.list-item{display:flex;align-items:flex-start;gap:clamp(8px,1.2vw,14px);padding:clamp(8px,1.2vh,14px) clamp(12px,2vw,20px);border-radius:clamp(4px,.6vw,8px)}
.list-dot{width:clamp(4px,.6vw,7px);height:clamp(4px,.6vw,7px);border-radius:50%;flex-shrink:0;margin-top:.4em}

/* ── CROSSOUT ── */
.crossout{position:relative;opacity:.7}
.crossout::after{content:'';position:absolute;left:0;top:50%;width:100%;height:1px;background:currentColor;opacity:.6}

/* ── PATH STEP ── */
.path-step{flex:1;border-radius:clamp(6px,.8vw,12px);padding:clamp(10px,1.8vh,20px) clamp(10px,1.5vw,16px);text-align:center}
.path-done{background:var(--berry)}
.path-todo{background:#fff;border:1px solid var(--border)}
</style>
</head>
<body>
<div id="progress"></div>
<div id="deck"></div>
<div id="nav">
  <button onclick="go(-1)">←</button>
  <span id="pg">1 / 38</span>
  <button onclick="go(1)">→</button>
  <span id="fullbtn" onclick="toggleFull()" title="全螢幕">⛶</span>
</div>

<script>
const slides = [];
let cur = 0;

function S(html){ slides.push(html) }

/* ─────────────── SLIDE DEFINITIONS ─────────────── */

/* P1 封面 */
S(`<div class="slide bg-dark2 left-bar col" style="justify-content:space-between">
  <div class="pad col gap-lg flex1 h-center" style="padding-left:clamp(32px,6vw,90px)">
    <div class="col gap-sm">
      <div class="t-label" style="color:var(--berry-l);margin-bottom:.5em">專家品牌定位課</div>
      <div class="t-hero" style="color:#fff">你的專業愈強<br>愈容易被低估</div>
    </div>
    <div class="col gap-sm" style="margin-top:clamp(8px,1.5vh,20px)">
      <div class="t-subtitle" style="color:var(--berry-l)">不靠低價、不做網紅，讓市場主動信任你</div>
      <div class="t-small" style="color:var(--muted);letter-spacing:.06em">定位重建　×　內容系統　×　專家品牌實戰</div>
    </div>
  </div>
  <div class="pad col" style="padding-left:clamp(32px,6vw,90px);padding-bottom:clamp(16px,3vh,36px);border-top:1px solid rgba(255,255,255,.08)">
    <div class="t-body" style="color:#fff;font-weight:500">Avon</div>
    <div class="t-small" style="color:var(--muted)">十年醫療代操，我的客戶是同業標竿</div>
  </div>
</div>`);

/* P2 這堂課不是什麼 */
S(`<div class="slide bg-cream col">
  <div class="ch-bar ch-bar-light"><div class="ch-dot"></div><span class="t-label" style="color:var(--muted)">開場設定</span></div>
  <div class="pad col gap-md flex1 h-center">
    <div class="t-title" style="color:var(--text)">這堂課，不是⋯⋯</div>
    <div class="col gap-sm" style="margin-top:clamp(4px,.8vh,10px)">
      ${["教你做網紅","又一堂社群工具課","叫你買廣告、衝流量"].map(t=>`
      <div class="list-item" style="background:#fff;border:1px solid var(--border)">
        <div class="list-dot" style="background:var(--berry-l)"></div>
        <div class="t-body crossout" style="color:var(--muted)">✕　${t}</div>
      </div>`).join("")}
    </div>
    <div style="margin-top:auto;padding:clamp(10px,1.8vh,18px) clamp(14px,2.5vw,28px);background:var(--berry);border-radius:clamp(6px,.8vw,12px)">
      <div class="t-body" style="color:#fff">教你讓市場主動信任你的專業——不必降格</div>
    </div>
  </div>
</div>`);

/* P3 今天帶走三件事 */
S(`<div class="slide bg-cream col">
  <div class="ch-bar ch-bar-light"><div class="ch-dot"></div><span class="t-label" style="color:var(--muted)">開場設定</span></div>
  <div class="pad col flex1 h-center gap-md">
    <div class="t-title" style="color:var(--text)">今天你會帶走三件事</div>
    <div class="row gap-md flex1" style="margin-top:clamp(4px,.8vh,10px)">
      ${[["01","診斷你現在卡在哪","找出你的專業為什麼沒被看見"],["02","一套可操作的內容框架","帶回去就能用的系統邏輯"],["03","你的第一句專家定位語","現場寫完、現場拿走"]].map(([n,t,s])=>`
      <div class="col card flex1 gap-sm" style="overflow:hidden;padding:0">
        <div style="background:var(--berry);padding:clamp(8px,1.4vh,16px);text-align:center">
          <div class="t-title" style="color:#fff">${n}</div>
        </div>
        <div class="col gap-sm" style="padding:clamp(10px,1.8vh,20px)">
          <div class="t-body" style="color:var(--text);font-weight:500">${t}</div>
          <div class="t-small" style="color:var(--muted)">${s}</div>
        </div>
      </div>`).join("")}
    </div>
  </div>
</div>`);

/* P4 開場場景 */
S(`<div class="slide bg-dark2 col">
  <div style="position:absolute;top:clamp(14px,2.5vh,28px);left:clamp(24px,4vw,56px)"><span class="badge badge-case">真實案例</span></div>
  <div class="pad col flex1 h-center" style="padding-left:clamp(32px,6vw,90px)">
    <div class="col gap-md">
      <div class="t-hero-sm" style="color:#fff">"有一位皮膚科醫師<br>龜毛到連標點符號都要確認<br>他很貴、排隊很長<br>從不為流量妥協"</div>
      <div class="stripe" style="margin-top:clamp(4px,.8vh,10px)"></div>
      <div class="t-subtitle" style="color:var(--berry-l)">他憑什麼？答案不是技術——是定位做對了</div>
    </div>
  </div>
</div>`);

/* P5 競爭對手不是同行 */
S(`<div class="slide bg-cream col">
  <div class="ch-bar ch-bar-light"><div class="ch-dot"></div><span class="t-label" style="color:var(--muted)">Ch.01　開場診斷：你的好，為什麼市場看不見　｜　20 分鐘</span></div>
  <div class="pad col flex1 h-center gap-md">
    <div class="t-title" style="color:var(--text)">你的競爭對手不是同行</div>
    <div class="row gap-md flex1" style="margin-top:clamp(4px,.8vh,10px)">
      <div class="cmp-col cmp-muted col gap-sm flex1 h-center">
        <div class="t-label" style="color:var(--muted)">你以為的競爭</div>
        <div class="divider" style="width:100%;margin:clamp(4px,.6vh,8px) 0"></div>
        ${["同行","低價工具","AI 自動化"].map(t=>`<div class="t-body" style="color:var(--muted)">${t}</div>`).join("")}
      </div>
      <div class="cmp-col cmp-berry col gap-sm flex1 h-center">
        <div class="t-label" style="color:rgba(255,255,255,.6)">真正的競爭</div>
        <div class="divider-dark" style="width:100%;margin:clamp(4px,.6vh,8px) 0"></div>
        <div class="t-title" style="color:#fff;text-align:center">沉默</div>
        <div class="t-small" style="color:rgba(255,255,255,.7);text-align:center">你不被看見<br>就被預設為跟別人一樣</div>
      </div>
    </div>
  </div>
</div>`);

/* P6 三種典型困境 */
S(`<div class="slide bg-cream col">
  <div class="ch-bar ch-bar-light"><div class="ch-dot"></div><span class="t-label" style="color:var(--muted)">Ch.01　開場診斷</span></div>
  <div class="pad col flex1 h-center gap-md">
    <div class="row v-center gap-md">
      <div class="t-title" style="color:var(--text)">三種典型困境</div>
      <div class="t-small" style="color:var(--berry);font-weight:500">你有幾個？</div>
    </div>
    <div class="col gap-sm flex1">
      ${[["醫師","技術很好但診所沒人主動找我","var(--berry-ll)","var(--berry)"],["律師","靠轉介紹，主動來的都在殺價","#E1F5EE","#0F6E56"],["設計師","接案接到懷疑人生，不知道怎麼漲價","#EAF3DE","#3B6D11"]].map(([role,q,bg,tc])=>`
      <div class="list-item flex1" style="background:${bg};border:1px solid var(--border)">
        <div style="background:${tc};color:#fff;border-radius:clamp(4px,.5vw,6px);padding:clamp(3px,.5vh,6px) clamp(6px,1vw,10px);flex-shrink:0;font-size:clamp(9px,1.4vh,14px);font-weight:500">${role}</div>
        <div class="t-body" style="color:var(--text);font-style:italic">"${q}"</div>
      </div>`).join("")}
    </div>
  </div>
</div>`);

/* P7 金句：信任是設計出來的 */
S(`<div class="slide bg-dark2 col center">
  <div class="pad col center gap-lg text-center">
    <div class="stripe breathe" style="margin:0 auto"></div>
    <div class="t-quote breathe" style="color:#fff;max-width:min(680px,80vw)">"你的專業不會自己說話<br>你必須替它搭一個舞台"</div>
    <div class="stripe breathe" style="margin:0 auto"></div>
  </div>
</div>`);

/* P8 信任三個來源 */
S(`<div class="slide bg-cream col">
  <div class="ch-bar ch-bar-light"><div class="ch-dot"></div><span class="t-label" style="color:var(--muted)">Ch.01　開場診斷</span></div>
  <div class="pad col flex1 h-center gap-md">
    <div class="t-title" style="color:var(--text)">信任的三個來源</div>
    <div class="row gap-md flex1" style="margin-top:clamp(4px,.8vh,10px)">
      ${[["01","曝光","你被看見<br>頻率與存在感",false],["02","一致性","你讓人記住<br>口吻、立場、調性不跳針",false],["03","框架","你讓人知道你是誰<br>"這個人跟別人不一樣"",true]].map(([n,name,desc,hi])=>`
      <div class="col flex1 ${hi?"card-berry":"card"} gap-sm" style="overflow:hidden;padding:0">
        <div style="padding:clamp(6px,1.2vh,14px);background:${hi?"rgba(0,0,0,.15)":"var(--berry-ll)"};text-align:center">
          <div class="t-label" style="color:${hi?"rgba(255,255,255,.7)":"var(--berry)"}">${n}</div>
        </div>
        <div class="col gap-sm flex1 h-center text-center" style="padding:clamp(10px,1.8vh,20px) clamp(8px,1.5vw,16px)">
          <div class="t-body" style="color:${hi?"#fff":"var(--text)"};font-weight:500">${name}</div>
          <div class="t-small" style="color:${hi?"rgba(255,255,255,.7)":"var(--muted)"}">${desc}</div>
        </div>
      </div>`).join("")}
    </div>
    <div style="text-align:center;padding:clamp(6px,1vh,12px);background:var(--berry);border-radius:clamp(4px,.6vw,8px)">
      <div class="t-small" style="color:#fff;font-weight:500">三者缺一，信任不成立</div>
    </div>
  </div>
</div>`);

/* P9 自我診斷 */
S(`<div class="slide bg-dark2 col">
  <div style="position:absolute;top:clamp(14px,2.5vh,28px);left:clamp(24px,4vw,56px)"><span class="badge" style="background:rgba(255,255,255,.1);color:rgba(255,255,255,.6)">現場練習</span></div>
  <div class="pad col flex1 h-center gap-lg" style="padding-top:clamp(40px,7vh,80px)">
    <div class="t-title" style="color:#fff">你的自我診斷</div>
    <div class="col gap-sm" style="width:100%">
      ${["你上次公開分享專業觀點，是什麼時候？","你的簡介和最近五篇貼文，是同一個人說話嗎？","潛在客戶看到你，5 秒內知道你做什麼嗎？"].map((q,i)=>`
      <div class="card-dark row v-center gap-md">
        <div class="t-title" style="color:var(--berry-l);font-family:'Cormorant Garamond',serif;min-width:clamp(20px,3vw,36px)">${i+1}</div>
        <div class="t-body" style="color:rgba(255,255,255,.85)">${q}</div>
      </div>`).join("")}
    </div>
  </div>
</div>`);

/* P10 Ch.01 過場 */
S(`<div class="slide bg-cream col left-bar">
  <div class="pad col flex1 h-center gap-md">
    <div class="t-label" style="color:var(--muted)">Ch.01 小結</div>
    <div class="t-hero-sm" style="color:var(--text)">問題從來不是你不夠好<br>是市場還沒有機會<br>用正確的眼光看見你</div>

/* ─────────────── RENDER ENGINE ─────────────── */
const deck = document.getElementById("deck");
const pg = document.getElementById("pg");
const bar = document.getElementById("progress");

slides.forEach((html,i)=>{
  const div = document.createElement("div");
  div.innerHTML = html.trim();
  const sl = div.firstElementChild;
  sl.dataset.i = i;
  deck.appendChild(sl);
});

function show(n){
  const all = deck.querySelectorAll(".slide");
  all.forEach(s=>{ s.classList.remove("active","enter","exit"); s.style.display="none"; });
  cur = Math.max(0, Math.min(slides.length-1, n));
  const sl = deck.querySelector(`.slide[data-i="${cur}"]`);
  sl.style.display="flex";
  void sl.offsetWidth;
  sl.classList.add("active","enter");
  pg.textContent = `${cur+1} / ${slides.length}`;
  bar.style.width = `${((cur+1)/slides.length)*100}%`;
}

function go(d){ show(cur+d); }

document.addEventListener("keydown",e=>{
  if(e.key==="ArrowRight"||e.key==="ArrowDown"||e.key===" ") go(1);
  if(e.key==="ArrowLeft"||e.key==="ArrowUp") go(-1);
  if(e.key==="f"||e.key==="F") toggleFull();
  e.preventDefault();
});

deck.addEventListener("click",()=>go(1));

function toggleFull(){
  if(!document.fullscreenElement) document.documentElement.requestFullscreen();
  else document.exitFullscreen();
}

show(0);
</script>
